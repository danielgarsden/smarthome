name: smarthome-ci

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      working-directory: ./application
       # This step installs your NuGet packages
      run: dotnet restore

    - name: Build
      working-directory: ./application
      # --no-restore makes it faster since we did it in the previous step
      run: dotnet build --no-restore --configuration Release

    # Upload the compiled binaries so the next job can use them
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v5
      with:
        name: build-output
        path: application/src/bin/Release/net10.0/

  test:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v5
      with:
        name: build-output
        path: application/src/bin/Release/net10.0/

    - name: Run Tests
      working-directory: ./application/tests
      # This will find your SmartHome.Tests project and run it
      run: dotnet test --no-build --configuration Release --verbosity normal